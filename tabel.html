<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard Data - AI Fashion</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
    <style>
      /* GRADASI MENYESUAIKAN BERANDA BG */
      body {
        font-family: "Inter", sans-serif;
        background: linear-gradient(135deg, #FDFBF9 0%, #F1DABF 100%);
        background-attachment: fixed;
        color: #362417;
      }

      /* Efek Glass Card */
      .glass-card {
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(241, 218, 191, 0.5);
      }
    </style>
  </head>
  <body class="min-h-screen pb-20">
    <div id="header-target"></div>

    <main class="max-w-6xl mx-auto px-6 space-y-6 mt-10">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="glass-card p-6 rounded-3xl border-2 border-[#362417] shadow-xl flex items-center justify-between">
          <div>
            <p class="text-[#92817A] text-[17px] font-bold uppercase mb-1">Total Responden</p>
            <h3 id="totalData" class="text-4xl font-black text-[#362417]">0</h3>
          </div>
          <div class="bg-[#F1DABF]/40 p-4 rounded-2xl">
            <i data-lucide="users" class="w-8 h-8 text-[#362417]"></i>
          </div>
        </div>

        <div class="glass-card p-6 rounded-3xl border-2 border-[#362417] shadow-xl">
          <p class="text-[#92817A] text-[17px] font-bold uppercase mb-4 flex items-center gap-2">
             <i data-lucide="search" class="w-7 h-7"></i> Klasifikasi Cluster
          </p>
          <div class="grid grid-cols-3 gap-3">
            <div class="bg-white/40 p-4 rounded-2xl border-2 border-[#F1DABF] text-center">
              <p class="text-[#92817A] text-[17px] font-bold uppercase mb-1">Casual</p>
              <h4 id="totalCasual" class="text-2xl font-black text-[#362417]">0</h4>
            </div>
            <div class="bg-white/40 p-4 rounded-2xl border-2 border-[#F1DABF] text-center">
              <p class="text-[#92817A] text-[17px] font-bold uppercase mb-1">Formal</p>
              <h4 id="totalFormal" class="text-2xl font-black text-[#362417]">0</h4>
            </div>
            <div class="bg-white/40 p-4 rounded-2xl border-2 border-[#F1DABF] text-center">
              <p class="text-[#92817A] text-[17px] font-bold uppercase mb-1">Simple</p>
              <h4 id="totalSimple" class="text-2xl font-black text-[#362417]">0</h4>
            </div>
          </div>
        </div>
      </div>

      <div class="glass-card rounded-3xl border-2 border-[#F1DABF] shadow-2xl overflow-hidden">
        <div class="overflow-x-auto">
          <table class="w-full text-left border-collapse">
            <thead>
              <tr class="bg-[#362417] text-[#F1DABF] uppercase text-[12px] font-black tracking-widest">
                <th class="p-5 border-b-2 border-[#F1DABF]/20">Nama</th>
                <th class="p-5 border-b-2 border-[#F1DABF]/20">Pakaian</th>
                <th class="p-5 border-b-2 border-[#F1DABF]/20">Warna</th>
                <th class="p-5 border-b-2 border-[#F1DABF]/20">Aksesoris</th>
                <th class="p-5 border-b-2 border-[#F1DABF]/20">Lokasi</th>
                <th class="p-5 border-b-2 border-[#F1DABF]/20">Cluster</th>
              </tr>
            </thead>
            <tbody id="tableBody" class="text-sm text-[#362417]">
                </tbody>
          </table>
        </div>

        <div class="p-6 bg-white/20 border-t border-[#F1DABF] flex justify-center items-center gap-2" id="paginationControls"></div>
      </div>
    </main>

    <script>
      lucide.createIcons();
      const SUPABASE_URL = "https://fimhhfpgvkzovazaybjj.supabase.co";
      const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpbWhoZnBndmt6b3ZhemF5YmpqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3MjMwMTIsImV4cCI6MjA5NDI5OTAxMn0.kKXEuqDy2UP2IbhnP8-vi-VTJ5ZfONSeUhFbmhHEiG0";
      const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

      let allData = [];
      let currentPage = 1;
      const itemsPerPage = 10;

      // Injeksi Header sesuai sistem yang kamu buat
      async function injectHeader() {
        try {
          const response = await fetch("header.html");
          const html = await response.text();
          document.getElementById("header-target").innerHTML = html;
          if (window.lucide) { lucide.createIcons(); }
        } catch (error) { console.error("Gagal memuat header:", error); }
      }
      injectHeader();

      // Fetch Data Supabase
      async function fetchData() {
        const { data, error } = await _supabase
          .from("hasil_klasifikasi")
          .select("*")
          .order("id", { ascending: false });
        
        if (error) { console.error("Error:", error.message); return; }
        
        allData = data;
        updateStats();
        renderTable();
      }

      function updateStats() {
        document.getElementById("totalData").innerText = allData.length;
        let c = 0, f = 0, s = 0;
        allData.forEach((r) => {
          if (r.label_hasil === "Casual") c++;
          else if (r.label_hasil === "Formal") f++;
          else if (r.label_hasil === "Simple") s++;
        });
        document.getElementById("totalCasual").innerText = c;
        document.getElementById("totalFormal").innerText = f;
        document.getElementById("totalSimple").innerText = s;
      }

      function renderTable() {
        const tableBody = document.getElementById("tableBody");
        tableBody.innerHTML = "";
        const start = (currentPage - 1) * itemsPerPage;
        const pageData = allData.slice(start, start + itemsPerPage);

        pageData.forEach((row) => {
          const tr = document.createElement("tr");
          tr.className = "hover:bg-[#362417]/5 transition-colors border-b border-[#F1DABF]/30";
          tr.innerHTML = `
            <td class="p-5 font-bold text-[17px]">${row.nama_responden}</td>
            <td class="p-5 text-[17px] capitalize font-medium">${row.jenis_pakaian}</td>
            <td class="p-5 text-[17px]">${row.warna_dominan}</td>
            <td class="p-5 text-[17px]">${row.aksesoris}</td>
            <td class="p-5 text-[17px] font-bold text-[#92817A]">${row.lokasi}</td>
            <td class="p-5">
              <span class="px-3 py-1 rounded-full bg-[#362417] text-[#F1DABF] border border-[#F1DABF] font-black text-[12px] uppercase shadow-sm">${row.label_hasil}</span>
            </td>
          `;
          tableBody.appendChild(tr);
        });
        renderPagination();
      }

      function renderPagination() {
        const controls = document.getElementById("paginationControls");
        const totalPages = Math.ceil(allData.length / itemsPerPage) || 1;
        controls.innerHTML = "";

        // Tombol Previous
        if (currentPage > 1) {
          controls.appendChild(createNavBtn("chevron-left", () => { currentPage--; renderTable(); }));
        }

        // Angka Halaman
        let startPage = Math.max(1, currentPage - 1);
        let endPage = Math.min(totalPages, startPage + 2);
        if (endPage - startPage < 2) { startPage = Math.max(1, endPage - 2); }

        for (let i = startPage; i <= endPage; i++) {
          controls.appendChild(createPageBtn(i));
        }

        // Tombol Next
        if (currentPage < totalPages) {
          controls.appendChild(createNavBtn("chevron-right", () => { currentPage++; renderTable(); }));
        }
        lucide.createIcons();
      }

      function createPageBtn(num) {
        const btn = document.createElement("button");
        btn.innerText = num;
        const isActive = currentPage === num;
        btn.className = `w-10 h-10 rounded-xl font-black text-xs transition-all border-2 ${isActive ? "bg-[#362417] text-[#F1DABF] border-[#362417] shadow-lg scale-110" : "bg-white/50 text-[#362417] border-[#F1DABF] hover:bg-[#362417] hover:text-[#F1DABF]"}`;
        btn.onclick = () => { currentPage = num; renderTable(); };
        return btn;
      }

      function createNavBtn(icon, action) {
        const btn = document.createElement("button");
        btn.innerHTML = `<i data-lucide="${icon}" class="w-5 h-5"></i>`;
        btn.className = "p-2.5 rounded-xl bg-[#F1DABF] text-[#362417] hover:bg-[#362417] hover:text-[#F1DABF] transition-all border-2 border-[#362417]/10 shadow-sm";
        btn.onclick = action;
        return btn;
      }

      fetchData();
    </script>
  </body>
</html>
