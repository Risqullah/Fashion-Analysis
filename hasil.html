<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hasil Klasifikasi - AI Fashion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #FDFBF9 0%, #F1DABF 100%); }</style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full bg-white rounded-[2rem] shadow-2xl overflow-hidden border-2 border-[#362417]">
        <div class="bg-[#362417] py-6 md:py-8 text-center">
            <p class="text-[#F1DABF] font-bold tracking-widest text-xs md:text-sm uppercase">Analisis Selesai</p>
        </div>
        
        <div class="p-6 md:p-10 text-center">
            <p class="text-[#92817A] text-xs md:text-sm mb-1 font-semibold uppercase">Gaya berpakaian anda</p>
            <h1 id="displayLabel" class="text-3xl md:text-5xl font-black text-[#362417] italic uppercase mb-6 tracking-tight"></h1>
            
            <div class="bg-[#F1DABF]/10 rounded-2xl p-4 md:p-6 mb-6 md:mb-8 border border-[#F1DABF] text-left space-y-3">
                <div class="flex justify-between border-b border-[#F1DABF]/50 pb-2 text-[10px] md:text-xs">
                    <span class="text-[#92817A] font-bold uppercase">Nama</span>
                    <span id="displayNama" class="text-[#362417] font-black text-right"></span>
                </div>
                <div class="flex justify-between border-b border-[#F1DABF]/50 pb-2 text-[10px] md:text-xs">
                    <span class="text-[#92817A] font-bold uppercase">Pakaian</span>
                    <span id="displayPakaian" class="text-[#362417] font-black text-right capitalize"></span>
                </div>
                <div class="flex justify-between border-b border-[#F1DABF]/50 pb-2 text-[10px] md:text-xs">
                    <span class="text-[#92817A] font-bold uppercase">Cluster</span>
                    <span id="displayLokasi" class="text-[#362417] font-black text-right uppercase"></span>
                </div>
            </div>

            <div class="flex flex-col gap-2">
                <a href="input.html" class="bg-[#362417] text-[#F1DABF] font-bold py-4 rounded-xl shadow-lg hover:opacity-90 transition-all text-xs uppercase tracking-widest">Analisis Lagi</a>
                <a href="tabel.html" class="text-[#362417] font-bold py-2 text-xs uppercase opacity-60">Lihat Dashboard</a>
            </div>
        </div>
    </div>
    <script>
        const d = JSON.parse(localStorage.getItem("hasil_terakhir"));
        if (!d) { window.location.href = "index.html"; } 
        else {
            document.getElementById("displayLabel").innerText = d.label;
            document.getElementById("displayNama").innerText = d.nama;
            document.getElementById("displayPakaian").innerText = d.pakaian;
            document.getElementById("displayLokasi").innerText = d.label;
        }
    </script>
</body>
</html>
