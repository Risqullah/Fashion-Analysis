<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hasil Klasifikasi - AI Fashion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #FFFBFF; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div class="max-w-md w-full bg-white rounded-3xl shadow-xl overflow-hidden border-2 border-[#362417]">
        <div class="bg-[#362417] py-8 text-center">
            <p class="text-[#F1DABF] font-bold tracking-widest text-sm uppercase">Analisis Selesai</p>
        </div>
        
        <div class="p-8 text-center">
            <p class="text-[#92817A] text-sm mb-1 font-semibold">Gaya berpakaian anda adalah</p>
            <h1 id="displayLabel" class="text-5xl font-black text-[#362417] italic uppercase mb-6 tracking-tight"></h1>
            
            <div class="bg-[#F1DABF]/20 rounded-2xl p-6 mb-8 border border-[#F1DABF] text-left space-y-3">
                <div class="flex justify-between border-b border-[#F1DABF] pb-2 text-xs">
                    <span class="text-[#92817A] font-bold uppercase">Nama</span>
                    <span id="displayNama" class="text-[#362417] font-semibold text-right"></span>
                </div>
                <div class="flex justify-between border-b border-[#F1DABF] pb-2 text-xs">
                    <span class="text-[#92817A] font-bold uppercase">Pakaian</span>
                    <span id="displayPakaian" class="text-[#362417] font-semibold text-right capitalize"></span>
                </div>
                <div class="flex justify-between border-b border-[#F1DABF] pb-2 text-xs">
                    <span class="text-[#92817A] font-bold uppercase">Warna</span>
                    <span id="displayWarna" class="text-[#362417] font-semibold text-right capitalize"></span>
                </div>
                <div class="flex justify-between border-b border-[#F1DABF] pb-2 text-xs">
                    <span class="text-[#92817A] font-bold uppercase">Aksesoris</span>
                    <span id="displayAksesoris" class="text-[#362417] font-semibold text-right capitalize"></span>
                </div>
                <div class="flex justify-between text-xs">
                    <span class="text-[#92817A] font-bold uppercase">Lokasi</span>
                    <span id="displayLokasi" class="text-[#362417] font-semibold text-right"></span>
                </div>
            </div>

            <div class="flex gap-3">
                <a href="index.html" class="flex-1 bg-[#F1DABF] text-[#362417] font-bold py-4 rounded-xl border-2 border-[#362417] shadow-md hover:bg-[#362417] hover:text-white transition-all text-sm text-center">
                    Coba Lagi
                </a>
                <a href="index.html" class="flex-1 bg-white text-[#362417] font-bold py-4 rounded-xl border-2 border-[#362417] hover:bg-[#F1DABF] transition-all text-sm text-center">
                    Ke Beranda
                </a>
            </div>
        </div>
    </div>

    <script>
        const rawData = localStorage.getItem("hasil_terakhir");
        if (!rawData) {
            window.location.href = "index.html";
        } else {
            const data = JSON.parse(rawData);
            document.getElementById("displayLabel").innerText = data.label;
            document.getElementById("displayNama").innerText = data.nama;
            document.getElementById("displayPakaian").innerText = data.pakaian;
            document.getElementById("displayWarna").innerText = data.warna || "-";
            document.getElementById("displayAksesoris").innerText = data.aksesoris || "-";
            document.getElementById("displayLokasi").innerText = data.lokasi || "-";
        }
    </script>
</body>
</html>
