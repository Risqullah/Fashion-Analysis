<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Beranda - AI Fashion Classifier</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <style>
      body { font-family: "Inter", sans-serif; background-image: url("beranda bg.png"); background-size: cover; background-position: center; }
      .bg-coffee { background-color: #362417; }
      .text-coffee { color: #362417; }
      .bg-almond { background-color: #F1DABF; }
      .border-coffee { border-color: #362417; }
    </style>
  </head>
  <body class="min-h-screen flex flex-col items-center justify-center p-4 md:p-6">
    <main class="max-w-2xl w-full text-center space-y-6 md:space-y-8 bg-white/10 backdrop-blur-md p-6 md:p-12 rounded-[2rem] md:rounded-[3rem] border border-white/20 shadow-2xl">
      <div class="flex justify-center">
        <div class="bg-almond p-4 md:p-6 rounded-full shadow-inner border-2 border-coffee">
          <i data-lucide="shirt" class="w-10 h-10 md:w-16 h-16 text-coffee"></i>
        </div>
      </div>

      <section class="space-y-3">
        <h1 class="text-3xl md:text-6xl font-black text-coffee leading-tight uppercase tracking-tighter">
          Fashion <br class="hidden md:block" /> Classifier
        </h1>
        <p class="text-white text-sm md:text-xl font-medium max-w-xs md:max-w-md mx-auto opacity-90">
          Temukan kategori gaya berpakaian anda melalui analisis sistem cerdas berbasis data kampus.
        </p>
      </section>

      <section class="flex flex-col sm:flex-row gap-3 md:gap-4 justify-center">
        <a href="input.html" class="bg-almond text-coffee font-bold py-4 md:py-5 px-8 md:px-10 rounded-2xl border-2 border-coffee shadow-[4px_4px_0px_0px_rgba(54,36,23,1)] hover:shadow-none hover:translate-x-1 hover:translate-y-1 transition-all text-base md:text-lg flex items-center justify-center gap-2">
          Mulai Analisis <i data-lucide="arrow-right" class="w-5 h-5"></i>
        </a>
        <a href="tabel.html" class="bg-almond text-coffee font-bold py-4 md:py-5 px-8 md:px-10 rounded-2xl border-2 border-coffee shadow-[4px_4px_0px_0px_rgba(54,36,23,1)] hover:shadow-none hover:translate-x-1 hover:translate-y-1 transition-all text-base md:text-lg flex items-center justify-center gap-2">
          Lihat Data <i data-lucide="database" class="w-5 h-5"></i>
        </a>
      </section>

      <footer class="pt-8 md:pt-12 text-white text-[10px] md:text-sm font-semibold uppercase tracking-widest flex flex-wrap items-center justify-center gap-4 md:gap-6 opacity-80">
        <div class="flex items-center gap-1"><i data-lucide="database" class="w-4 h-4"></i> Supabase</div>
        <div class="flex items-center gap-1"><i data-lucide="check-circle" class="w-4 h-4"></i> Projek UTS - Kelompok 3</div>
      </footer>
    </main>
    <script>lucide.createIcons();</script>
  </body>
</html>
